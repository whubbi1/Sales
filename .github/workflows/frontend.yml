# .github/workflows/frontend.yml
# CI/CD : Test → Build → Deploy AWS Amplify

name: Frontend — Deploy to AWS Amplify

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'

env:
  AWS_REGION: eu-west-1

jobs:
  # ─── Qualité ──────────────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Build test
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.wcomply.com
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}

  # ─── Deploy Amplify ───────────────────────────────────────────────────────
  deploy:
    name: Deploy Amplify
    runs-on: ubuntu-latest
    # Deliberately not gated on `needs: quality` — lint/typecheck runs in parallel for
    # visibility, but a failing check shouldn't block deployment (Amplify's own auto-build
    # on this branch deploys unconditionally regardless of this workflow anyway).
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Déployer sur AWS Amplify
        run: |
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name master \
            --job-type RELEASE

      - name: Attendre le déploiement
        run: |
          echo "⏳ Déploiement Amplify en cours..."
          sleep 30
          STATUS=$(aws amplify get-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name master \
            --job-id $(aws amplify list-jobs \
              --app-id ${{ secrets.AMPLIFY_APP_ID }} \
              --branch-name master \
              --no-paginate \
              --query 'jobSummaries[0].jobId' \
              --output text) \
            --query 'job.summary.status' \
            --output text)
          echo "Statut : $STATUS"
