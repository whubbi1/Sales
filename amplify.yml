version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - npm run build
        - mkdir -p .amplify-hosting/compute/default
        - cp -r .next/standalone/. .amplify-hosting/compute/default/
        - cp -r .next/static .amplify-hosting/compute/default/.next/static
        - cp -r public .amplify-hosting/compute/default/public
        - echo '{"version":1,"routes":[{"path":"/_next/static/*","target":{"kind":"Static"},"headers":{"cache-control":"public, max-age=31536000, immutable"}},{"path":"/*","target":{"kind":"Compute","src":"default"}}],"computeResources":[{"name":"default","runtime":"nodejs18.x","entrypoint":"server.js"}]}' > .amplify-hosting/deploy-manifest.json
  artifacts:
    baseDirectory: frontend/.amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
